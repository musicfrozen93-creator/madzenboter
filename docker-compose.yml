version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: zengrid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading_bot
      POSTGRES_USER: trading_bot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading_bot_dev_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading_bot -d trading_bot"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  zengrid-engine:
    build: .
    container_name: zengrid-engine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - TZ=UTC
      - DATABASE_URL=postgresql://trading_bot:${POSTGRES_PASSWORD:-trading_bot_dev_password}@postgres:5432/trading_bot
      - MASTER_ENCRYPTION_KEY=${MASTER_ENCRYPTION_KEY}
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - ADMIN_API_PORT=${ADMIN_API_PORT:-8000}
    ports:
      - "${ADMIN_API_PORT:-8000}:${ADMIN_API_PORT:-8000}"
    volumes:
      - logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  logs:
